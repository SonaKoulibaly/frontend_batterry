<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoH Predictor - Battery Health</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            font-family: 'Orbitron', monospace;
            background: #0a0e27;
            color: #fff;
        }
        .glow {
            text-shadow: 0 0 20px #00ff41;
        }
    </style>
</head>
<body class="min-h-screen">
    
    <div class="container mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold glow mb-4">🔋 SoH PREDICTOR</h1>
            <p class="text-xl text-gray-400">Battery Health Analytics - LSTM AI</p>
        </div>
        
        <div class="max-w-2xl mx-auto bg-slate-800 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-green-400">📊 Upload CSV</h2>
            
            <input type="file" id="csvFile" accept=".csv" class="w-full mb-6 p-4 bg-slate-700 rounded-lg text-white">
            
            <button id="predictBtn" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-4 rounded-lg disabled:opacity-50" disabled>
                ⚡ ANALYSER
            </button>
            
            <div id="loading" class="hidden mt-6 text-center">
                <p class="text-green-400">⏳ Analyse en cours...</p>
            </div>
            
            <div id="results" class="hidden mt-8">
                <h3 class="text-xl font-bold mb-4 text-green-400">✅ Résultats</h3>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-slate-700 p-4 rounded-lg">
                        <p class="text-sm text-gray-400">Moyen</p>
                        <p id="meanSoH" class="text-2xl font-bold text-green-400">--</p>
                    </div>
                    <div class="bg-slate-700 p-4 rounded-lg">
                        <p class="text-sm text-gray-400">Min</p>
                        <p id="minSoH" class="text-2xl font-bold text-cyan-400">--</p>
                    </div>
                    <div class="bg-slate-700 p-4 rounded-lg">
                        <p class="text-sm text-gray-400">Max</p>
                        <p id="maxSoH" class="text-2xl font-bold text-yellow-400">--</p>
                    </div>
                </div>
                <canvas id="chart"></canvas>
            </div>
            
            <div id="error" class="hidden mt-6 bg-red-900 border border-red-500 rounded-lg p-4 text-red-200"></div>
        </div>
        
        <div class="text-center mt-12 text-gray-400">
            <p>API : <span class="text-green-400" id="apiStatus">Vérification...</span></p>
            <p class="mt-2">Créé par <strong class="text-white">Sona KOULIBALY</strong> • Mars 2026</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://ona6-battery-soh-api.hf.space';
        
        let uploadedData = null;
        let chart = null;
        
        const csvFile = document.getElementById('csvFile');
        const predictBtn = document.getElementById('predictBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorDiv = document.getElementById('error');
        const apiStatus = document.getElementById('apiStatus');
        
        // Vérifier API au chargement
        fetch(API_URL)
            .then(r => r.json())
            .then(d => {
                apiStatus.textContent = d.model_loaded ? '✅ Connectée (Modèle chargé)' : '⚠️ Connectée (Modèle non chargé)';
                apiStatus.className = d.model_loaded ? 'text-green-400' : 'text-yellow-400';
            })
            .catch(() => {
                apiStatus.textContent = '❌ Déconnectée';
                apiStatus.className = 'text-red-400';
            });
        
        csvFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const text = e.target.result;
                    const lines = text.trim().split('\n');
                    const headers = lines[0].split(',').map(h => h.trim());
                    
                    const data = [];
                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split(',');
                        const row = {};
                        headers.forEach((h, idx) => {
                            row[h] = isNaN(values[idx]) ? values[idx] : parseFloat(values[idx]);
                        });
                        data.push(row);
                    }
                    
                    if (data.length < 20) {
                        showError(`❌ Minimum 20 mesures requises (vous avez ${data.length})`);
                        return;
                    }
                    
                    uploadedData = data;
                    predictBtn.disabled = false;
                    hideError();
                    
                } catch (err) {
                    showError('❌ Erreur lecture CSV : ' + err.message);
                }
            };
            reader.readAsText(file);
        });
        
        predictBtn.addEventListener('click', async () => {
            if (!uploadedData) return;
            
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            hideError();
            predictBtn.disabled = true;
            
            try {
                const res = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: uploadedData})
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Erreur serveur');
                }
                
                const result = await res.json();
                
                if (!result.success) throw new Error('Échec prédiction');
                
                displayResults(result);
                
            } catch (err) {
                showError('❌ ' + err.message);
            } finally {
                loading.classList.add('hidden');
                predictBtn.disabled = false;
            }
        });
        
        function displayResults(result) {
            const stats = result.statistics;
            
            document.getElementById('meanSoH').textContent = stats.mean.toFixed(2) + '%';
            document.getElementById('minSoH').textContent = stats.min.toFixed(2) + '%';
            document.getElementById('maxSoH').textContent = stats.max.toFixed(2) + '%';
            
            const ctx = document.getElementById('chart').getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: result.predictions.map((_, i) => i + 1),
                    datasets: [{
                        label: 'SoH Prédit (%)',
                        data: result.predictions,
                        borderColor: '#00ff41',
                        backgroundColor: 'rgba(0, 255, 65, 0.1)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {labels: {color: '#fff'}}
                    },
                    scales: {
                        x: {ticks: {color: '#94a3b8'}},
                        y: {ticks: {color: '#94a3b8'}}
                    }
                }
            });
            
            results.classList.remove('hidden');
        }
        
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
        }
        
        function hideError() {
            errorDiv.classList.add('hidden');
        }
    </script>

</body>
</html>
